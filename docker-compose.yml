services:
  proxy_guard:
    image: ubuntu/squid:latest
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    networks:
          default:     # dynamic IP for external internet
          secure_net:
            ipv4_address: 10.50.0.5  # Forces this specific IP on the secure net
  api_bridge:
      image: alpine/socat
      ports:
        - "127.0.0.1:8082:8080" # Maps host 8080 to the bridge
      # Tunnels traffic from the bridge directly into the sandbox's backend
      command: tcp-listen:8080,fork,reuseaddr tcp-connect:claude-sandbox:8080
      networks:
        - default    # Exposes port to your local machine
        - secure_net # Reaches into the isolated sandbox
      depends_on:
        - claude-sandbox
  claude-sandbox:
    image: claude-sandbox-image
    runtime: kata-runtime
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8'
    environment:
      - HTTP_PROXY=http://10.50.0.5:3128
      - HTTPS_PROXY=http://10.50.0.5:3128
      - GLOBAL_AGENT_HTTP_PROXY=http://10.50.0.5:3128
      - http_proxy=http://10.50.0.5:3128
      - https_proxy=http://10.50.0.5:3128
      - NO_PROXY=localhost,127.0.0.1,0.0.0.0
      - no_proxy=localhost,127.0.0.1,0.0.0.0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODE_SERVER_PORT=8081
    volumes:
      - ${TARGET_REPO_ABS}:/workspace/readonly_repo:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    networks:
      - secure_net
    stdin_open: true 
    tty: true        
    command: bash /entrypoint.sh
  admin_bridge:
      image: alpine/socat
      ports:
        - "127.0.0.1:9001:9000"
      command: tcp-listen:9000,fork,reuseaddr tcp-connect:claude-sandbox:9000
      networks:
        - default
        - secure_net
      depends_on:
        - claude-sandbox
  ui_bridge:
    image: alpine/socat
    ports:
      # Allows dynamic port assignment, falls back to 8080 if not set
      - "8081:8081"
    # routes traffic using the internal service name 'claude-sandbox'
    command: tcp-listen:8081,fork,reuseaddr tcp-connect:claude-sandbox:8081
    networks:
      - default    # Exposes port to localhost
      - secure_net # Routes to the isolated sandbox
    depends_on:
      - claude-sandbox

networks:
  secure_net:
    internal: true
    ipam:
      config:
        - subnet: 10.50.0.0/16  # Assigns a dedicated private subnet