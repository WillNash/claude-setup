# Define allowed ports (HTTPS only for the API)
acl SSL_ports port 443
acl Safe_ports port 443
acl CONNECT method CONNECT

# Define our single allowed destination
acl claude_api dstdomain api.anthropic.com

# Security: Deny requests to unknown ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# The Whitelist: Allow Claude API, block everything else
http_access allow claude_api
http_access deny all

# Listen on standard proxy port
http_port 3128