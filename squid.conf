# Define allowed ports (HTTPS only for the API)
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Define anthropic destinations
acl claude_domains dstdomain .anthropic.com
acl claude_domains dstdomain .claude.com
acl claude_domains dstdomain .claude.ai

# Define Git destinations
acl git_domains dstdomain .github.com
acl git_domains dstdomain .githubusercontent.com

# Define npm destinations
acl npm_domains dstdomain .npmjs.org
acl npm_domains dstdomain .npmjs.com

# Define Node.js/NodeSource destinations (Optional, but highly recommended for installing modern Node)
acl node_domains dstdomain .nodesource.com
acl node_domains dstdomain .nodejs.org

# Define Nix/Cachix destinations (Apex + Subdomains)
acl nix_domains dstdomain .cachix.org
acl nix_domains dstdomain .nixos.org

# Security: Deny requests to unknown ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# The Whitelist
http_access allow claude_domains
http_access allow git_domains
http_access allow nix_domains
http_access allow npm_domains
http_access allow node_domains

# block everything else
http_access deny all

# Listen on standard proxy port
http_port 3128